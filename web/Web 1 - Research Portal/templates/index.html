<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>UPB Research Portal - Acceso</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
    />
    <style>
      body {
        background-color: #f4f7f6;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      }
      .login-card {
        max-width: 400px;
        margin: 100px auto;
        border-radius: 15px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
      }
      .btn-primary {
        background-color: #004a99;
        border: none;
      }
      .btn-primary:hover {
        background-color: #003366;
      }
      .logo {
        max-width: 150px;
        margin-bottom: 20px;
      }
    </style>
  </head>
  <body>
    <div class="container text-center">
      <div class="card login-card p-4">
        <h2 class="mb-4">Portal de Investigación</h2>
        <p class="text-muted">
          Ingresa tu identificador para acceder al dashboard personalizado.
        </p>
        <form action="/dashboard" method="GET">
          <div class="mb-3">
            <input
              type="text"
              name="name"
              class="form-control"
              placeholder="ID de Investigador"
              required
            />
          </div>
          <button type="submit" class="btn btn-primary w-100">Acceder</button>
        </form>
      </div>
    </div>
  </body>
</html>
